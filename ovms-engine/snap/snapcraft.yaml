name: ovms-engine
version: '1.0.0'
title: OpenVINO Model Server Engine
summary: OpenVINO Model Server inference snap for Intel hardware
description: |
  Inference snap packaging OpenVINO Model Server (OVMS) with silicon-optimised
  engine variants for Intel CPU, GPU, and NPU. Built on the Canonical Inference
  Snaps framework with automatic hardware detection and engine selection via
  modelctl.

  Exposes gRPC endpoint (TensorFlow Serving Predict API) and REST endpoint
  for computer vision model serving. Supports dynamic model loading via
  config file polling.

  Part of the AWS IoT Greengrass + Ubuntu Core + Intel OpenVINO partnership
  demo for edge computer vision.
contact: https://github.com/aws-samples/sample-greengrass-ubuntucore-computervision/issues
source-code: https://github.com/aws-samples/sample-greengrass-ubuntucore-computervision
issues: https://github.com/aws-samples/sample-greengrass-ubuntucore-computervision/issues
license: MIT-0

base: core24
grade: stable
confinement: strict

platforms:
  amd64:

environment:
  # Standard inference snap environment variables
  SNAP_COMPONENTS: /snap/$SNAP_INSTANCE_NAME/components/$SNAP_REVISION
  ARCH_TRIPLET: x86_64-linux-gnu

parts:
  # Canonical Inference Snaps CLI (modelctl)
  # Provides: hardware detection, engine selection, config management,
  # server lifecycle, and component installation
  cli:
    source: https://github.com/canonical/inference-snaps-cli.git
    source-tag: v1.0.0-beta.24
    plugin: go
    build-snaps:
      - go/1.24/stable
    stage-packages:
      - pciutils
      - clinfo
    organize:
      bin/cli: bin/modelctl

  # OpenVINO Model Server binary
  # OVMS releases provide pre-built binaries via GitHub releases and Docker images.
  # For snap packaging, extract the ovms binary from the official release tarball.
  # The binary is self-contained with OpenVINO runtime libraries.
  # Each hardware variant (CPU/GPU/NPU) gets its own component with the
  # appropriate plugins and libraries.
  #
  # Build approach: Download the pre-built OVMS release binary and stage it
  # into the runtime components. Building from source requires bazel and takes
  # 30+ minutes - not practical for iterative snap development.
  #
  # Extract from the Docker image before running snapcraft (see docs/building-snaps.md):
  #   docker create --name ovms-tmp openvino/model_server:2024.5
  #   docker cp ovms-tmp:/ovms/bin/ovms ./ovms
  #   docker cp ovms-tmp:/ovms/lib/ ./lib
  #   docker rm ovms-tmp
  ovms:
    source: .
    source-type: local
    plugin: nil
    override-build: |
      # Fetch OVMS pre-built binary from the official Docker image
      # This avoids the 30+ minute bazel build from source
      OVMS_VERSION="2024.5"
      OVMS_IMAGE="openvino/model_server:${OVMS_VERSION}"

      # Pull and extract the ovms binary and libraries
      # In CI/CD, use: docker create + docker cp
      # For local dev, place pre-extracted binaries in a local directory
      if [ -f "${CRAFT_PART_SRC}/ovms" ]; then
        echo "Using pre-extracted OVMS binary from source directory"
        # Install to per-component intermediate paths; organize routes to component partitions
        install -D "${CRAFT_PART_SRC}/ovms" "${CRAFT_PART_INSTALL}/ovms-cpu-stage/usr/bin/ovms"
        install -D "${CRAFT_PART_SRC}/ovms" "${CRAFT_PART_INSTALL}/ovms-gpu-stage/usr/bin/ovms"
        install -D "${CRAFT_PART_SRC}/ovms" "${CRAFT_PART_INSTALL}/ovms-npu-stage/usr/bin/ovms"
      else
        echo "WARNING: OVMS binary not found at ${CRAFT_PART_SRC}/ovms"
        echo "Extract it from the Docker image before building:"
        echo "  docker create --name ovms-tmp openvino/model_server:${OVMS_VERSION}"
        echo "  docker cp ovms-tmp:/ovms/bin/ovms ovms-engine/ovms"
        echo "  docker cp ovms-tmp:/ovms/lib/ ovms-engine/lib/"
        echo "  docker rm ovms-tmp"
        exit 1
      fi

      # Stage shared libraries into each component's area if present
      if [ -d "${CRAFT_PART_SRC}/lib" ]; then
        for variant in cpu gpu npu; do
          mkdir -p "${CRAFT_PART_INSTALL}/ovms-${variant}-stage/usr/lib"
          cp -r "${CRAFT_PART_SRC}/lib/." "${CRAFT_PART_INSTALL}/ovms-${variant}-stage/usr/lib/"
        done
      fi
    organize:
      "ovms-cpu-stage/usr/bin/ovms": "(component/ovms-cpu)/usr/bin/ovms"
      "ovms-gpu-stage/usr/bin/ovms": "(component/ovms-gpu)/usr/bin/ovms"
      "ovms-npu-stage/usr/bin/ovms": "(component/ovms-npu)/usr/bin/ovms"
      "ovms-cpu-stage/usr/lib/*": "(component/ovms-cpu)/usr/lib/"
      "ovms-gpu-stage/usr/lib/*": "(component/ovms-gpu)/usr/lib/"
      "ovms-npu-stage/usr/lib/*": "(component/ovms-npu)/usr/lib/"
    stage-packages:
      - libgomp1
      - libxml2
      - libpugixml1v5

  # Engine definitions
  engines:
    source: engines
    plugin: dump
    organize:
      "*": engines/

  # Server wrapper scripts
  scripts:
    source: scripts
    plugin: dump
    stage-packages:
      - jq
    organize:
      "server.sh": bin/

  # Component local files (model manifests and component.yaml)
  component-local-files:
    source: components
    plugin: dump
    organize:
      "ovms-cpu/*": (component/ovms-cpu)/
      "ovms-gpu/*": (component/ovms-gpu)/
      "ovms-npu/*": (component/ovms-npu)/
      "model-faster-rcnn/*": (component/model-faster-rcnn)/
      "model-efficientnet/*": (component/model-efficientnet)/

apps:
  # CLI exposed as the snap name (ovms-engine)
  ovms-engine:
    command: bin/modelctl
    plugs:
      - hardware-observe
      - opengl
      - network

  # OVMS server daemon
  server:
    command: bin/server.sh
    daemon: simple
    restart-condition: on-failure
    restart-delay: 5s
    plugs:
      - network
      - network-bind
      - hardware-observe
      - opengl

# Content interface slots for Greengrass snap integration
# Allows the Greengrass snap to write OVMS config and custom models
slots:
  inference-config:
    interface: content
    content: inference-config
    write:
      - $SNAP_COMMON/config
  inference-models:
    interface: content
    content: inference-models
    write:
      - $SNAP_COMMON/models

# Snap components: runtime variants and model weights
components:
  # Runtime components (one per hardware target)
  ovms-cpu:
    type: standard
    summary: OVMS runtime optimised for Intel CPU
    description: |
      OpenVINO Model Server binary and libraries optimised for Intel CPU
      inference. Serves as the fallback engine on all Intel platforms.

  ovms-gpu:
    type: standard
    summary: OVMS runtime optimised for Intel GPU
    description: |
      OpenVINO Model Server binary and libraries optimised for Intel
      integrated and discrete GPU inference via OpenCL.

  ovms-npu:
    type: standard
    summary: OVMS runtime optimised for Intel NPU
    description: |
      OpenVINO Model Server binary and libraries optimised for Intel
      Neural Processing Unit (NPU) inference.

  # Model components (OpenVINO IR format)
  model-faster-rcnn:
    type: standard
    summary: Faster R-CNN object detection model (OpenVINO IR)
    description: |
      Faster R-CNN ResNet50 object detection model trained on COCO dataset.
      Includes OpenVINO IR format weights (.xml/.bin) and manifest.json
      with model metadata for auto-configuration.

  model-efficientnet:
    type: standard
    summary: EfficientNet B0 classification model (OpenVINO IR)
    description: |
      EfficientNet B0 image classification model in OpenVINO IR format.
      Includes manifest.json with model metadata for auto-configuration.

hooks:
  install:
    plugs:
      - hardware-observe
      - opengl
  configure:
    plugs:
      - network
