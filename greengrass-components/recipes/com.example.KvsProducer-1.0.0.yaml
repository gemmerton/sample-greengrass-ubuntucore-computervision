---
RecipeFormatVersion: '2020-01-25'
ComponentName: com.example.KvsProducer
ComponentVersion: '1.0.0'
ComponentDescription: >
  Streams annotated live video from the edge device to AWS Kinesis Video Streams.
  Owns the camera via GStreamer, overlays inference bounding boxes using a
  time-window model, and publishes inference snapshots to camera/images.
ComponentPublisher: AWS
ComponentDependencies:
  com.example.CameraHandlerCore:
    VersionRequirement: '^1.0.0'
    DependencyType: SOFT
  com.example.DetectionHandler:
    VersionRequirement: '^1.0.0'
    DependencyType: SOFT
  aws.greengrass.ShadowManager:
    VersionRequirement: '^2.0.0'
    DependencyType: HARD
  aws.greengrass.TokenExchangeService:
    VersionRequirement: '^2.0.0'
    DependencyType: HARD
ComponentConfiguration:
  DefaultConfiguration:
    KvsStreamName: "ubuntu-core-gg-demo-stream"
    Region: "us-east-1"
    CameraDevice: "/dev/video0"
    # Path where the kvs-gstreamer snap content interface is mounted.
    #
    # Ubuntu Core snap confinement prevents apt-get and cmake inside Greengrass
    # component lifecycle scripts. GStreamer runtime libraries and libgstkvssink.so
    # are instead pre-built into the kvs-gstreamer snap and shared here via the
    # snap content interface.
    #
    # Deploy steps (once per device, after installing the kvs-gstreamer snap):
    #   snap connect aws-iot-greengrass:gstreamer-kvs kvs-gstreamer:gstreamer-kvs
    #
    # The mount path below matches the target declared in the Greengrass snap's
    # gstreamer-kvs content plug.  Update if your Greengrass snap uses a different
    # target (e.g. $SNAP_DATA/gstreamer-kvs = /var/snap/aws-iot-greengrass/current/gstreamer-kvs).
    GstKvsMount: "/var/snap/aws-iot-greengrass/common/gstreamer-kvs"
    accessControl:
      aws.greengrass.ShadowManager:
        com.example.KvsProducer:shadow:1:
          policyDescription: 'Read and write the kvs-config named shadow'
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
          resources:
            - '$aws/things/*/shadow/name/kvs-config'
      aws.greengrass.ipc.pubsub:
        com.example.KvsProducer:pubsub:1:
          policyDescription: 'Publish inference snapshot paths to camera/images'
          operations:
            - 'aws.greengrass#PublishToTopic'
          resources:
            - 'camera/images'
      aws.greengrass.ipc.mqttproxy:
        com.example.KvsProducer:mqttproxy:1:
          policyDescription: 'Subscribe to detection results and shadow delta; publish health metrics'
          operations:
            - 'aws.greengrass#SubscribeToIoTCore'
            - 'aws.greengrass#PublishToIoTCore'
          resources:
            - 'camera/detections'
            - 'camera/kvs-status'
            - '$aws/things/*/shadow/name/kvs-config/update/delta'
Manifests:
  - Platform:
      os: linux
    Lifecycle:
      Install:
        Timeout: 300
        Script: |
          /bin/bash -c 'set -e && \
          python3 -m venv --without-pip venv/ && \
          source venv/bin/activate && \
          python3 {artifacts:path}/get-pip.py && \
          python3 -m pip install -r {artifacts:path}/requirements.txt && \
          deactivate'
      Run:
        Script: |
          /bin/bash -c 'set -e && \
          GST_KVS_MOUNT="{configuration:/GstKvsMount}" && \
          export LD_LIBRARY_PATH="${GST_KVS_MOUNT}/lib:${LD_LIBRARY_PATH:-}" && \
          export GST_PLUGIN_PATH="${GST_KVS_MOUNT}/lib/gstreamer-1.0" && \
          export GI_TYPELIB_PATH="${GST_KVS_MOUNT}/lib/girepository-1.0" && \
          export GST_PLUGIN_SCANNER="${GST_KVS_MOUNT}/lib/gstreamer-1.0/gst-plugin-scanner" && \
          export PYTHONPATH="${GST_KVS_MOUNT}/lib/python3:${PYTHONPATH:-}" && \
          export AWS_DEFAULT_REGION="{configuration:/Region}" && \
          export KVS_STREAM_NAME="{configuration:/KvsStreamName}" && \
          export CAMERA_DEVICE="{configuration:/CameraDevice}" && \
          export AWS_IOT_THING_NAME="{iot:thingName}" && \
          source venv/bin/activate && \
          python3 {artifacts:path}/kvs_producer.py'
    Artifacts:
      - Uri: kvs_producer.py
        Unarchive: NONE
      - Uri: frame_annotator.py
        Unarchive: NONE
      - Uri: gstreamer_pipeline.py
        Unarchive: NONE
      - Uri: shadow_config.py
        Unarchive: NONE
      - Uri: health_monitor.py
        Unarchive: NONE
      - Uri: requirements.txt
        Unarchive: NONE
      - Uri: get-pip.py
        Unarchive: NONE
