---
RecipeFormatVersion: '2020-01-25'
ComponentName: com.example.ModelManagerCore
ComponentVersion: '1.0.0'
ComponentDescription: 'Bridges IoT Device Shadow events to snap management and OVMS configuration for dynamic model lifecycle management'
ComponentPublisher: AWS
ComponentDependencies:
  aws.greengrass.ShadowManager:
    VersionRequirement: '^2.0.0'
  aws.greengrass.TokenExchangeService:
    VersionRequirement: '^2.0.0'
ComponentConfiguration:
  DefaultConfiguration:
    # Snap component path (read-only, inside ovms-engine snap)
    SnapComponentsPath: "/snap/ovms-engine/components/current"

    # Content interface mount paths
    # These paths correspond to the Greengrass snap's content plug targets.
    # The aws-iot-greengrass snap must declare content plugs that mount the
    # ovms-engine snap's shared directories into the Greengrass snap's filesystem:
    #
    #   plugs:
    #     inference-config:
    #       interface: content
    #       content: inference-config
    #       target: $SNAP_DATA/ovms-engine-config
    #     inference-models:
    #       interface: content
    #       content: inference-models
    #       target: $SNAP_DATA/ovms-engine-models
    #
    # After connection, writes to these paths appear in the ovms-engine snap's
    # $SNAP_COMMON/config/ and $SNAP_COMMON/models/ directories respectively.
    # Connect the interfaces with:
    #   snap connect aws-iot-greengrass:inference-config ovms-engine:inference-config
    #   snap connect aws-iot-greengrass:inference-models ovms-engine:inference-models
    OvmsConfigDir: "/var/snap/aws-iot-greengrass/current/ovms-engine-config"
    SnapCommonPath: "/var/snap/aws-iot-greengrass/current/ovms-engine-models"

    # OVMS gRPC endpoint (ovms-engine snap exposes on localhost:9000)
    OvmsGrpcUrl: "localhost:9000"

    # Health check interval (seconds)
    HealthCheckInterval: "30"

    accessControl:
      aws.greengrass.ShadowManager:
        com.example.ModelManagerCore:shadow:1:
          policyDescription: 'Allows read and write access to the model-config named shadow'
          operations:
            - 'aws.greengrass#GetThingShadow'
            - 'aws.greengrass#UpdateThingShadow'
          resources:
            - '$aws/things/*/shadow/name/model-config'
      aws.greengrass.ipc.mqttproxy:
        com.example.ModelManagerCore:mqttproxy:1:
          policyDescription: 'Allows subscription to model-config shadow delta updates'
          operations:
            - 'aws.greengrass#SubscribeToIoTCore'
          resources:
            - '$aws/things/*/shadow/name/model-config/update/delta'
        com.example.ModelManagerCore:mqttproxy:2:
          policyDescription: 'Allows publication of model manager status and error events'
          operations:
            - 'aws.greengrass#PublishToIoTCore'
          resources:
            - 'model-manager/*/status'
            - 'model-manager/*/errors'
Manifests:
- Platform:
    os: all
    runtime: '*'
  Lifecycle:
    Install:
      Script: |
        /bin/bash -c 'set -e && \
        python3 -m venv --without-pip venv/ && \
        source venv/bin/activate && \
        python3 {artifacts:path}/get-pip.py && \
        python3 -m pip install -r {artifacts:path}/requirements.txt && \
        deactivate'
    Run:
      Script: |
        /bin/bash -c 'set -e && \
        source venv/bin/activate && \
        export AWS_IOT_THING_NAME="{iot:thingName}" && \
        export SNAP_COMPONENTS="{configuration:/SnapComponentsPath}" && \
        export SNAP_COMMON="{configuration:/SnapCommonPath}" && \
        export OVMS_CONFIG_DIR="{configuration:/OvmsConfigDir}" && \
        export OVMS_GRPC_URL="{configuration:/OvmsGrpcUrl}" && \
        export HEALTH_CHECK_INTERVAL="{configuration:/HealthCheckInterval}" && \
        python3 {artifacts:path}/model_manager_core.py'
  Artifacts:
    - Uri: model_manager_core.py
      Unarchive: NONE
    - Uri: ovms_config.py
      Unarchive: NONE
    - Uri: snapd_client.py
      Unarchive: NONE
    - Uri: get-pip.py
      Unarchive: NONE
    - Uri: requirements.txt
      Unarchive: NONE
