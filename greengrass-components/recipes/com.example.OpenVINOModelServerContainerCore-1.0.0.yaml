RecipeFormatVersion: '2020-01-25'
ComponentName: com.example.OpenVINOModelServerContainerCore
ComponentVersion: '1.0.0'
ComponentDescription: 'OpenVINO Model Server Docker Container'
ComponentPublisher: AWS
ComponentConfiguration:
  DefaultConfiguration:
    "model_name": "faster_rcnn"
    "model_path": "/model"
    "port": "9000"
Manifests:
  - Platform:
      os: linux
      runtime: '*'
    Lifecycle:
      Startup:
        requiresPrivilege: true
        Script: |
          # Stop and remove any existing container bound to the model server port
          EXISTING=$(docker ps -aq --filter "publish={configuration:/port}")
          if [ -n "$EXISTING" ]; then
            echo "Stopping existing container(s) on port {configuration:/port}: $EXISTING"
            docker stop $EXISTING 2>/dev/null || true
            docker rm $EXISTING 2>/dev/null || true
          fi
          # Also remove any container with the target name (stopped or running)
          docker rm -f ovms-{configuration:/model_name} 2>/dev/null || true
          # Launch the model server container
          docker run -u 0 -d --name ovms-{configuration:/model_name} \
            -v {artifacts:decompressedPath}/object_detection_model/model:/model \
            -p {configuration:/port}:{configuration:/port} \
            openvino/model_server:latest \
            --model_name {configuration:/model_name} \
            --model_path {configuration:/model_path} \
            --port {configuration:/port}
      Shutdown:
        requiresPrivilege: true
        Script: |
          docker stop ovms-{configuration:/model_name} 2>/dev/null || true
          docker rm ovms-{configuration:/model_name} 2>/dev/null || true
    Artifacts:
      - Uri: object_detection_model.zip
        Unarchive: ZIP